<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ السيرة الذاتية الاحترافي المطور | CV Generator</title>
    <style>
        /* --- التصميم العام --- */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --font-ar: 'Tajawal', sans-serif;
            --font-en: 'Inter', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            padding: 30px 20px;
            font-family: var(--font-ar);
            transition: direction 0.3s ease;
        }

        html[dir="ltr"] body {
            font-family: var(--font-en);
        }

        .container {
            display: flex;
            max-width: 1300px;
            margin: 0 auto;
            gap: 30px;
        }

        /* --- قسم مدخلات البيانات --- */
        .form-section {
            flex: 1;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .lang-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .lang-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #0f172a;
            color: #fff;
            border-color: #0f172a;
        }

        .form-section h2 {
            margin-bottom: 25px;
            color: #1e293b;
            font-size: 1.4rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #475569;
            font-size: 0.95rem;
        }

        .form-group input, .form-section textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        .form-group input:focus, .form-section textarea:focus {
            outline: none;
            border-color: #0f172a;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
        }

        /* أزرار الإجراءات */
        .actions-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .add-field-btn {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            text-align: center;
        }

        .add-field-btn:hover {
            background-color: #2563eb;
        }

        .print-btn {
            width: 100%;
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        .print-btn:hover {
            background-color: #219653;
        }

        /* --- قسم السيرة الذاتية الاحترافية --- */
        .preview-section {
            flex: 1.3;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-height: 297mm;
            display: flex;
            overflow: hidden;
        }

        .cv-sidebar {
            width: 35%;
            background-color: #1e293b;
            color: #f8fafc;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .cv-main {
            width: 65%;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .preview-name {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
            color: #fff;
            margin-bottom: 5px;
        }

        .preview-title {
            font-size: 1.1rem;
            color: #38bdf8;
            font-weight: 500;
        }

        .sidebar-section h4 {
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #334155;
        }

        .contact-item {
            font-size: 0.9rem;
            margin-bottom: 12px;
            word-break: break-all;
            color: #cbd5e1;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .skill-tag {
            background: #334155;
            color: #e2e8f0;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .main-section h3 {
            color: #0f172a;
            font-size: 1.3rem;
            margin-bottom: 12px;
            position: relative;
            padding-bottom: 6px;
            border-bottom: 2px solid #e2e8f0;
        }

        html[dir="rtl"] .main-section h3::after {
            content: ''; position: absolute; bottom: -2px; right: 0; width: 50px; height: 2px; background-color: #38bdf8;
        }
        html[dir="ltr"] .main-section h3::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 50px; height: 2px; background-color: #38bdf8;
        }

        .main-section p {
            color: #334155;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-line;
        }

        @media print {
            body { background: none; padding: 0; }
            .no-print { display: none !important; }
            .preview-section { box-shadow: none; padding: 0; width: 100%; min-height: 100vh; border-radius: 0; }
            .container { display: block; }
            .cv-sidebar { background-color: #1e293b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الإدخال -->
        <div class="form-section no-print">
            <div class="lang-selector">
                <button class="lang-btn active" onclick="setLanguage('ar')">العربية</button>
                <button class="lang-btn" onclick="setLanguage('en')">English</button>
                <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
            </div>

            <h2 id="form-heading">📝 بيانات السيرة الذاتية</h2>
            
            <form id="cv-form">
                <!-- الحقول الأساسية الثابتة -->
                <div id="dynamic-fields-container">
                    <div class="form-group">
                        <label id="lbl-name" for="input-name">الاسم الكامل:</label>
                        <input type="text" id="input-name" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label id="lbl-title" for="input-title">المسمى الوظيفي:</label>
                        <input type="text" id="input-title" placeholder="Web Developer">
                    </div>
                    <div class="form-group">
                        <label id="lbl-email" for="input-email">البريد الإلكتروني:</label>
                        <input type="email" id="input-email" placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label id="lbl-phone" for="input-phone">رقم الهاتف:</label>
                        <input type="tel" id="input-phone" placeholder="+123456789">
                    </div>
                    <div class="form-group">
                        <label id="lbl-skills" for="input-skills">المهارات (افصل بفاصلة ,):</label>
                        <input type="text" id="input-skills" placeholder="HTML, CSS, JS">
                    </div>
                    <div class="form-group">
                        <label id="lbl-about" for="input-about">الملخص المهني:</label>
                        <textarea id="input-about" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label id="lbl-experience" for="input-experience">الخبرات المهنية:</label>
                        <textarea id="input-experience" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label id="lbl-education" for="input-education">التعليم:</label>
                        <textarea id="input-education" rows="3"></textarea>
                    </div>
                </div>

                <!-- أزرار التحكم والإضافة والطباعة -->
                <div class="actions-container">
                    <button type="button" class="add-field-btn" id="lbl-add-btn">➕ إضافة قسم جديد (اضغط مرتين)</button>
                    <button type="button" onclick="window.print()" class="print-btn" id="lbl-print-btn">🖨️ طباعة / حفظ PDF</button>
                </div>
            </form>
        </div>

        <!-- قسم المعاينة الحية للـ CV -->
        <div class="preview-section" id="cv-preview">
            <div class="cv-sidebar">
                <div>
                    <h1 class="preview-name" id="preview-name">Name</h1>
                    <p class="preview-title" id="preview-title">Title</p>
                </div>
                <div class="sidebar-section">
                    <h4 id="view-title-contact">اتصال</h4>
                    <div class="contact-item" id="preview-email">📧 email@example.com</div>
                    <div class="contact-item" id="preview-phone">📞 +00000000</div>
                </div>
                <div class="sidebar-section">
                    <h4 id="view-title-skills">المهارات</h4>
                    <div id="preview-skills" class="skills-container"></div>
                </div>
            </div>

            <!-- الحاوية الرئيسية للمعاينة لتستقبل الأقسام الديناميكية الجديدة -->
            <div class="cv-main" id="cv-main-container">
                <div class="main-section">
                    <h3 id="view-title-about">الملخص المهني</h3>
                    <p id="preview-about">...</p>
                </div>
                <div class="main-section">
                    <h3 id="view-title-experience">الخبرة المهنية</h3>
                    <p id="preview-experience">...</p>
                </div>
                <div class="main-section">
                    <h3 id="view-title-education">التعليم</h3>
                    <p id="preview-education">...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- كود الـ JavaScript المطور بالتفاعل الثنائي -->
    <script>
        let currentLang = 'ar';
        let customFieldCounter = 0;

        const translations = {
            ar: {
                dir: "rtl",
                formHeading: "📝 بيانات السيرة الذاتية",
                lblName: "الاسم الكامل:", lblTitle: "المسمى الوظيفي:", lblEmail: "البريد الإلكتروني:", lblPhone: "رقم الهاتف:", lblSkills: "المهارات (افصل بفاصلة ,):", lblAbout: "الملخص المهني:", lblExperience: "الخبرات المهنية:", lblEducation: "التعليم والشهادات:", lblPrint: "🖨️ طباعة أو حفظ كـ PDF",
                lblAddBtn: "➕ إضافة قسم جديد (اضغط مرتين)", promptMsg: "أدخل عنوان القسم الجديد الخاص بك (مثال: المشاريع، اللغات):",
                viewContact: "اتصال", viewSkills: "المهارات", viewAbout: "الملخص المهني", viewExperience: "الخبرة المهنية", viewEducation: "التعليم والشهادات"
            },
            en: {
                dir: "ltr",
                formHeading: "📝 CV Information Input",
                lblName: "Full Name:", lblTitle: "Job Title:", lblEmail: "Email Address:", lblPhone: "Phone Number:", lblSkills: "Skills (Separate with ,):", lblAbout: "Professional Summary:", lblExperience: "Work Experience:", lblEducation: "Education:", lblPrint: "🖨️ Print or Save as PDF",
                lblAddBtn: "➕ Add New Section (Double Click)", promptMsg: "Enter the title of your new section (e.g., Projects, Languages):",
                viewContact: "Contact", viewSkills: "Skills", viewAbout: "Summary", viewExperience: "Experience", viewEducation: "Education"
            },
            fr: {
                dir: "ltr",
                formHeading: "📝 Informations du CV",
                lblName: "Nom Complet:", lblTitle: "Poste Occupé:", lblEmail: "E-mail:", lblPhone: "Téléphone:", lblSkills: "Compétences (Séparez par ,):", lblAbout: "Résumé Professionnel:", lblExperience: "Expérience Professionnelle:", lblEducation: "Éducation / Formation:", lblPrint: "🖨️ Imprimer ou Enregistrer en PDF",
                lblAddBtn: "➕ Ajouter une Section (Double Clic)", promptMsg: "Entrez le titre de la nouvelle section (ex: Projets, Langues):",
                viewContact: "Contact", viewSkills: "Compétences", viewAbout: "Résumé", viewExperience: "Expérience", viewEducation: "Éducation"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            const data = translations[lang];
            
            document.getElementById('html-root').setAttribute('dir', data.dir);
            document.getElementById('html-root').setAttribute('lang', lang);
            
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('form-heading').innerText = data.formHeading;
            document.getElementById('lbl-name').innerText = data.lblName;
            document.getElementById('lbl-title').innerText = data.lblTitle;
            document.getElementById('lbl-email').innerText = data.lblEmail;
            document.getElementById('lbl-phone').innerText = data.lblPhone;
            document.getElementById('lbl-skills').innerText = data.lblSkills;
            document.getElementById('lbl-about').innerText = data.lblAbout;
            document.getElementById('lbl-experience').innerText = data.lblExperience;
            document.getElementById('lbl-education').innerText = data.lblEducation;
            document.getElementById('lbl-print-btn').innerText = data.lblPrint;
            document.getElementById('lbl-add-btn').innerText = data.lblAddBtn;

            document.getElementById('view-title-contact').innerText = data.viewContact;
            document.getElementById('view-title-skills').innerText = data.viewSkills;
            document.getElementById('view-title-about').innerText = data.viewAbout;
            document.getElementById('view-title-experience').innerText = data.viewExperience;
            document.getElementById('view-title-education').innerText = data.viewEducation;
        }

        // --- ميزة الضغط مرتين (Double Click) لزيادة العناوين / الأقسام ---
        const addBtn = document.getElementById('lbl-add-btn');
        addBtn.addEventListener('dblclick', () => {
            const sectionName = prompt(translations[currentLang].promptMsg);
            
            if (sectionName && sectionName.trim() !== "") {
                customFieldCounter++;
                const fieldId = `custom-field-${customFieldCounter}`;

                // 1. إنشاء حقل الإدخال الجديد في جهة الـ Form
                const formContainer = document.getElementById('dynamic-fields-container');
                const formGroup = document.createElement('div');
                formGroup.className = 'form-group';
                
                const label = document.createElement('label');
                label.innerText = sectionName + ":";
                label.htmlFor = fieldId;

                const textarea = document.createElement('textarea');
                textarea.id = fieldId;
                textarea.rows = 3;

                formGroup.appendChild(label);
                formGroup.appendChild(textarea);
                formContainer.appendChild(formGroup);

                // 2. إنشاء قسم العرض الجديد في جهة الـ CV المعاينة الحية
                const cvMainContainer = document.getElementById('cv-main-container');
                const mainSection = document.createElement('div');
                mainSection.className = 'main-section';

                const h3 = document.createElement('h3');
                h3.innerText = sectionName;

                const p = document.createElement('p');
                p.id = `preview-${fieldId}`;
                p.innerText = "...";

                mainSection.appendChild(h3);
                mainSection.appendChild(p);
                cvMainContainer.appendChild(mainSection);

                // 3. ربط التحديث الحي فورياً للحقل الجديد المضاف
                textarea.addEventListener('input', (e) => {
                    p.innerText = e.target.value.trim() || "...";
                });
            }
        });

        // منطق التحديث الحي للحقول الأساسية الثابتة
        const inputs = {
            name: document.getElementById('input-name'),
            title: document.getElementById('input-title'),
            email: document.getElementById('input-email'),
            phone: document.getElementById('input-phone'),
            about: document.getElementById('input-about'),
            experience: document.getElementById('input-experience'),
            education: document.getElementById('input-education'),
        };

        const previews = {
            name: document.getElementById('preview-name'),
            title: document.getElementById('preview-title'),
            email: document.getElementById('preview-email'),
            phone: document.getElementById('preview-phone'),
            about: document.getElementById('preview-about'),
            experience: document.getElementById('preview-experience'),
            education: document.getElementById('preview-education'),
        };

        function updatePreview(key) {
            inputs[key].addEventListener('input', (e) => {
                const value = e.target.value.trim();
                if(key === 'email') previews[key].innerText = "📧 " + (value || "info@example.com");
                else if(key === 'phone') previews[key].innerText = "📞 " + (value || "+000 00000");
                else previews[key].innerText = value || "...";
            });
        }

        Object.keys(inputs).forEach(key => updatePreview(key));

        document.getElementById('input-skills').addEventListener('input', (e) => {
            const skillsPreview = document.getElementById('preview-skills');
            const skillsArray = e.target.value.split(',');
            skillsPreview.innerHTML = ''; 
            
            skillsArray.forEach(skill => {
                if (skill.trim() !== '') {
                    const span = document.createElement('span');
                    span.className = 'skill-tag';
                    span.innerText = skill.trim();
                    skillsPreview.appendChild(span);
                }
            });
        });
    </script>
</body>
</html>
